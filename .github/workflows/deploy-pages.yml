name: Deploy to GitHub Pages

# Builds the Vite app on every push to main and deploys the built `dist/`
# output via the official GitHub Pages Actions pipeline.
#
# One-time setup required on GitHub:
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions"
# (Do NOT use "Deploy from a branch -> main": Pages cannot run Vite, so it would
#  serve the unbuilt source index.html and the page would be blank/broken.)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: define these as repo Actions Variables
          # (Settings -> Secrets and variables -> Actions -> Variables) to point
          # the hosted app at a live backend. Leave unset for self-contained
          # mock/demo mode. The API must be served over HTTPS (mixed content is
          # blocked on the HTTPS Pages site) and must allow CORS from the Pages origin.
          VITE_API_MODE: ${{ vars.VITE_API_MODE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
