<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a73e8" />
    <title>Diagnosis Center Offline</title>
    <style>
      :root { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f172a; background: #f8fbff; }
      body { margin: 0; min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left)); background: radial-gradient(circle at top left, rgba(26,115,232,.16), transparent 32%), linear-gradient(180deg,#f8fbff,#eef3f8); }
      main { width: min(100%, 28rem); border: 1px solid rgba(226,232,240,.9); border-radius: 1.5rem; background: rgba(255,255,255,.95); padding: 1.25rem; box-shadow: 0 18px 55px rgba(15,23,42,.12); }
      h1 { margin: 0 0 .5rem; font-size: 1.35rem; letter-spacing: -.03em; }
      p { margin: 0; line-height: 1.6; color: #475569; }
      .hint { margin-top: .75rem; border-radius: 1rem; background: #f1f5f9; padding: .75rem; font-size: .9rem; font-weight: 650; color: #334155; }
      button { margin-top: 1rem; width: 100%; min-height: 3rem; border: 0; border-radius: 1rem; background: #1a73e8; color: #fff; font-weight: 800; font: inherit; }
      button:focus-visible { outline: 3px solid rgba(26,115,232,.28); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main role="alert" aria-live="assertive">
      <h1>You are offline</h1>
      <p>The app shell is still available, but live records, uploads, payment actions and delivery tasks need network access.</p>
      <p class="hint">Reconnect to the internet, then reload this page to continue safely.</p>
      <button type="button" onclick="window.location.reload()">Reconnect and reload</button>
    </main>
  </body>
</html>
